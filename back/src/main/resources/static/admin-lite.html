<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>酒店后台 - 预订管理</title>
  <style>
    :root {
      --ink: #18202f;
      --muted: #687282;
      --line: #dfe4ec;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --warn: #b45309;
      --danger: #b42318;
      --ok: #047857;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--paper);
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(24, 32, 47, 0.12);
    }

    h1, h2 { margin: 0; }
    h1 { font-size: 34px; }
    h2 { font-size: 21px; margin-bottom: 16px; }

    .muted { color: var(--muted); }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.online { background: var(--ok); }

    .login-panel {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 24px;
      margin-top: 28px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(24, 32, 47, 0.11);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(24, 32, 47, 0.10);
    }

    .field {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .btn {
      height: 40px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: var(--brand);
      padding: 0 16px;
      cursor: pointer;
    }

    .btn:hover { background: var(--brand-dark); }
    .btn.secondary { color: var(--ink); background: #edf2f7; }
    .btn.secondary:hover { background: #e2e8f0; }
    .btn.warn { background: var(--warn); }
    .btn.warn:hover { background: #92400e; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .message {
      min-height: 22px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
    }

    .workspace { display: none; margin-top: 24px; }
    .workspace.active { display: block; }
    .hide { display: none !important; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid rgba(24, 32, 47, 0.11);
      border-radius: 8px;
      padding: 16px;
    }

    .stat span { display: block; color: var(--muted); font-size: 13px; }
    .stat strong { display: block; margin-top: 8px; font-size: 24px; }

    .toolbar {
      display: grid;
      grid-template-columns: 150px 1fr 140px 110px 110px;
      gap: 12px;
      align-items: end;
      background: var(--panel);
      border: 1px solid rgba(24, 32, 47, 0.11);
      border-radius: 8px;
      padding: 16px;
    }

    .toolbar .field { margin: 0; }

    .table-wrap {
      margin-top: 16px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(24, 32, 47, 0.11);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      background: #f7fafc;
      white-space: nowrap;
    }

    .money { font-weight: 700; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.paid {
      background: #d1fae5;
      color: #065f46;
    }

    .action-cell {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
    }

    .pager-actions { display: flex; gap: 8px; }
    .empty { padding: 40px 16px; text-align: center; color: var(--muted); }

    @media (max-width: 900px) {
      .topbar, .login-panel { grid-template-columns: 1fr; flex-direction: column; }
      .stats, .toolbar { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 1040px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>酒店后台</h1>
        <p class="muted">预订管理、订单状态查看与酒店内部操作。</p>
      </div>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">未登录</span>
      </div>
    </header>

    <section id="loginPanel" class="login-panel">
      <form id="loginForm" class="card">
        <h2>登录后台</h2>
        <div class="field">
          <label for="role">角色</label>
          <select id="role" name="role">
            <option value="users">管理员</option>
            <option value="yuangong">员工</option>
          </select>
        </div>
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" value="admin" autocomplete="username">
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" value="admin" autocomplete="current-password">
        </div>
        <button class="btn" type="submit">登录</button>
        <div id="loginMsg" class="message"></div>
      </form>

      <div class="card">
        <h2>账号</h2>
        <p class="muted">管理员：admin / admin</p>
        <p class="muted">员工：YG2024001 / 123456</p>
        <p class="muted">用户支付入口已移到前台：个人中心 → 我的预订。</p>
      </div>
    </section>

    <section id="workspace" class="workspace">
      <div class="stats">
        <div class="stat"><span>当前页记录</span><strong id="pageCount">0</strong></div>
        <div class="stat"><span>全部预订</span><strong id="totalCount">0</strong></div>
        <div class="stat"><span>当前页已支付</span><strong id="paidCount">0</strong></div>
        <div class="stat"><span>当前页未支付</span><strong id="unpaidCount">0</strong></div>
      </div>

      <div class="toolbar">
        <div class="field">
          <label for="searchField">搜索字段</label>
          <select id="searchField">
            <option value="yonghuming">用户名</option>
            <option value="xingming">姓名</option>
            <option value="shoujihao">手机号</option>
            <option value="yudingbianhao">预订编号</option>
            <option value="kefangmingcheng">客房名称</option>
          </select>
        </div>
        <div class="field">
          <label for="keyword">关键词</label>
          <input id="keyword" placeholder="输入后点击查询">
        </div>
        <div class="field">
          <label for="payFilter">支付状态</label>
          <select id="payFilter">
            <option value="">全部</option>
            <option value="已支付">已支付</option>
            <option value="未支付">未支付</option>
          </select>
        </div>
        <button id="searchBtn" class="btn" type="button">查询</button>
        <button id="resetBtn" class="btn secondary" type="button">重置</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>预订编号</th>
              <th>客人</th>
              <th>联系方式</th>
              <th>客房</th>
              <th>日期</th>
              <th>数量</th>
              <th>金额</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="bookingRows"></tbody>
        </table>
        <div id="emptyState" class="empty hide">暂无预订数据</div>
        <div class="pager">
          <span id="pageInfo">第 1 页</span>
          <div class="pager-actions">
            <button id="prevBtn" class="btn secondary" type="button">上一页</button>
            <button id="nextBtn" class="btn secondary" type="button">下一页</button>
            <button id="logoutBtn" class="btn" type="button">退出</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const contextPath = '/' + location.pathname.split('/').filter(Boolean)[0];
    const apiBase = location.origin + contextPath;
    const tokenKey = 'hotel-lite-token';
    const roleKey = 'hotel-lite-role';
    const usernameKey = 'hotel-lite-username';

    const state = {
      page: 1,
      limit: 10,
      totalPage: 1,
      token: localStorage.getItem(tokenKey) || '',
      role: localStorage.getItem(roleKey) || 'users',
      username: localStorage.getItem(usernameKey) || ''
    };

    const roleMap = {
      users: { label: '管理员', loginPath: '/users/login' },
      yuangong: { label: '员工', loginPath: '/yuangong/login' }
    };

    const loginPanel = document.getElementById('loginPanel');
    const workspace = document.getElementById('workspace');
    const loginForm = document.getElementById('loginForm');
    const loginMsg = document.getElementById('loginMsg');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const rows = document.getElementById('bookingRows');
    const emptyState = document.getElementById('emptyState');
    const pageInfo = document.getElementById('pageInfo');

    function setLoginDefaults(role) {
      const defaults = {
        users: ['admin', 'admin'],
        yuangong: ['YG2024001', '123456']
      };
      document.getElementById('username').value = defaults[role][0];
      document.getElementById('password').value = defaults[role][1];
    }

    document.getElementById('role').addEventListener('change', event => {
      setLoginDefaults(event.target.value);
    });

    function setLoginView(isLoggedIn) {
      loginPanel.classList.toggle('hide', isLoggedIn);
      workspace.classList.toggle('active', isLoggedIn);
      statusDot.classList.toggle('online', isLoggedIn);
      statusText.textContent = isLoggedIn
        ? `${roleMap[state.role].label} ${state.username} 已登录`
        : '未登录';
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[char]);
    }

    function payText(value) {
      const text = String(value || '').trim();
      if (!text) return '未支付';
      return text.includes('已') || text.toLowerCase() === 'paid' ? '已支付' : '未支付';
    }

    function formatMoney(value) {
      const number = Number(value || 0);
      return '￥' + number.toFixed(2);
    }

    async function request(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (state.token) headers.Token = state.token;
      const response = await fetch(apiBase + path, { ...options, headers });
      const data = await response.json();
      if (data.code && data.code !== 0) throw new Error(data.msg || '请求失败');
      return data;
    }

    async function login(role, username, password) {
      const body = new URLSearchParams({ username, password });
      const data = await request(roleMap[role].loginPath, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body
      });
      state.token = data.token;
      state.role = role;
      state.username = username;
      localStorage.setItem(tokenKey, data.token);
      localStorage.setItem(roleKey, role);
      localStorage.setItem(usernameKey, username);
      setLoginView(true);
      await loadBookings(1);
    }

    function buildQuery(page) {
      const params = new URLSearchParams({
        page: String(page),
        limit: String(state.limit),
        sidx: 'id',
        order: 'desc'
      });
      const field = document.getElementById('searchField').value;
      const keyword = document.getElementById('keyword').value.trim();
      const payFilter = document.getElementById('payFilter').value;
      if (keyword) params.set(field, keyword);
      if (payFilter) params.set('ispay', payFilter);
      return params.toString();
    }

    async function loadBookings(page = state.page) {
      rows.innerHTML = '<tr><td colspan="9">正在加载...</td></tr>';
      const data = await request('/kefangyuding/page?' + buildQuery(page));
      const pageData = data.data || {};
      const list = pageData.list || [];
      state.page = pageData.currPage || page;
      state.totalPage = pageData.totalPage || 1;
      renderRows(list);
      renderStats(list, pageData.total || 0);
      pageInfo.textContent = `第 ${state.page} / ${state.totalPage} 页，共 ${pageData.total || 0} 条`;
    }

    function renderRows(list) {
      emptyState.classList.toggle('hide', list.length > 0);
      rows.innerHTML = list.map(item => {
        const paid = payText(item.ispay);
        const canPay = false;
        return `
          <tr>
            <td>${escapeHtml(item.yudingbianhao)}</td>
            <td>${escapeHtml(item.xingming || item.yonghuming)}<br><span class="muted">${escapeHtml(item.yonghuming)}</span></td>
            <td>${escapeHtml(item.shoujihao)}</td>
            <td>${escapeHtml(item.kefangmingcheng)}<br><span class="muted">${escapeHtml(item.kefangleixing)}</span></td>
            <td>${escapeHtml(item.yudingriqi || '')}</td>
            <td>${escapeHtml(item.shuliang || 1)}</td>
            <td class="money">${formatMoney(item.zongjine || item.kefangjiage)}</td>
            <td><span class="pill ${paid === '已支付' ? 'paid' : ''}">${paid}</span></td>
            <td>
              <div class="action-cell">
                ${canPay ? `<button class="btn warn" type="button" data-pay-id="${escapeHtml(item.id)}">支付</button>` : '<span class="muted">-</span>'}
              </div>
            </td>
          </tr>
        `;
      }).join('');
      if (!list.length) rows.innerHTML = '';
    }

    function renderStats(list, total) {
      const paid = list.filter(item => payText(item.ispay) === '已支付').length;
      document.getElementById('pageCount').textContent = list.length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('paidCount').textContent = paid;
      document.getElementById('unpaidCount').textContent = list.length - paid;
    }

    async function payBooking(id) {
      if (!confirm('确定支付该订单吗？')) return;
      const detail = await request('/kefangyuding/info/' + encodeURIComponent(id));
      const booking = detail.data || {};
      booking.ispay = '已支付';
      await request('/kefangyuding/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json;charset=UTF-8' },
        body: JSON.stringify(booking)
      });
      alert('支付成功');
      await loadBookings(state.page);
    }

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      loginMsg.textContent = '';
      try {
        await login(
          document.getElementById('role').value,
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        );
      } catch (error) {
        loginMsg.textContent = error.message;
      }
    });

    rows.addEventListener('click', event => {
      const button = event.target.closest('[data-pay-id]');
      if (button) payBooking(button.dataset.payId).catch(error => alert(error.message));
    });

    document.getElementById('searchBtn').addEventListener('click', () => loadBookings(1));
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('keyword').value = '';
      document.getElementById('payFilter').value = '';
      loadBookings(1);
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (state.page > 1) loadBookings(state.page - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (state.page < state.totalPage) loadBookings(state.page + 1);
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      state.token = '';
      localStorage.removeItem(tokenKey);
      localStorage.removeItem(roleKey);
      localStorage.removeItem(usernameKey);
      setLoginView(false);
    });

    if (state.token) {
      setLoginView(true);
      loadBookings().catch(() => {
        state.token = '';
        localStorage.removeItem(tokenKey);
        setLoginView(false);
      });
    } else {
      setLoginView(false);
    }
  </script>
</body>
</html>
